name: Upstream sync

on:
  schedule: [{ cron: "0 6 * * 1" }]
  workflow_dispatch:

jobs:
  sync:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, token: ${{ secrets.GITHUB_TOKEN }} }
      - run: git submodule update --remote vendor/PathOfBuilding-PoE2
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - run: pwsh scripts/bundle-luajit.ps1
      - run: cargo run -p extract -- --pob vendor/PathOfBuilding-PoE2 --out src-frontend/data
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: upstream-sync
          title: "chore: upstream sync (automated)"
          commit-message: "chore: upstream PoB-PoE2 sync"
          labels: upstream-sync
